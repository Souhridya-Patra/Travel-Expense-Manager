services:
  postgres:
    image: postgres:16-alpine
    container_name: tem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel_expense_manager
    ports:
      - "5432:5432"
    volumes:
      - tem-postgres-data:/var/lib/postgresql/data

volumes:
  tem-postgres-data:
